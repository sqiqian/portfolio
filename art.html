<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sketchbook | My Indie Dream</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --night-base: #15121A;       
            --sky-text: #FDFBF7;       
            --sky-gold: #FCE6D0;      
            
            /* PARCHMENT COLORS FOR THE FRAMES */
            --beige-glass: rgba(244, 238, 228, 0.95); 
            --navy-text: #1A2238;                     
            --dark-gold: #9E7449;                     
            --slate-accent: #54627B;                  
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* THE SPARKLE CURSOR */
        body {
            cursor: url('sparkle.png') 16 16, auto; 
        }

        a, button, .nav-btn, .stylized-button {
            cursor: url('sparkle.png') 16 16, pointer; 
        }

        /* BACKGROUND TRICK */
        body::before {
            content: "";
            position: fixed;
            top: -15px; left: -15px; right: -15px; bottom: -15px;
            background-image: url('YOUR-NIGHTSKY-BACKGROUND.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            filter: blur(8px) brightness(0.5); 
            z-index: -10; 
        }

        body {
            background-color: var(--night-base); 
            color: var(--sky-text);
            font-family: 'Lora', serif;
            font-size: 1.15rem;
            line-height: 1.8;
            padding: 0 10% 5% 10%; 
            overflow-x: hidden;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9); 
        }

        h1, h2, h3, h4 {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        /* --------------------------------------
           NAVIGATION
           -------------------------------------- */
        .main-menu {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px; 
            padding: 30px 0 10px 0;
            z-index: 10; 
            position: relative;
        }

        .nav-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 160px; 
            height: 55px; 
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--sky-text);
            text-shadow: 1px 1px 5px rgba(0,0,0,0.9); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .nav-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
            color: var(--sky-gold);
        }

        .btn-home     { background-image: url('button 1.png'); }
        .btn-about    { background-image: url('button 2.png'); }
        .btn-projects { background-image: url('button 3.png'); }
        .btn-blog     { background-image: url('button 4.png'); }

        /* --------------------------------------
           GALLERY HEADER
           -------------------------------------- */
        .gallery-header {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid rgba(252, 230, 208, 0.3);
        }

        .gallery-header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            color: var(--sky-gold);
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
            margin-bottom: 10px;
        }

        .gallery-header p {
            color: var(--sky-text);
            font-size: 1.3rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* --------------------------------------
           THE SKETCHBOOK GRID
           -------------------------------------- */
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            /* This makes the grid responsive: it fits as many 300px columns as possible */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        /* The "Mounted Canvas" Frames */
        .art-frame {
            background: var(--beige-glass);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 20px 20px 30px 20px; /* Thicker padding at the bottom like a polaroid */
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }

        /* Interactive Hover: The frame lifts up and glows slightly */
        .art-frame:hover {
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 0 25px 45px rgba(0,0,0,0.9);
            border-color: var(--sky-gold);
        }

        /* Varying the tilts slightly so it looks like a real sketchbook */
        .art-frame:nth-child(even):hover { transform: translateY(-10px) rotate(-1deg); }

        .art-image {
            width: 100%;
            height: auto;
            border: 1px solid var(--dark-gold); /* Inner frame border */
            border-radius: 4px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .art-caption {
            font-family: 'Cinzel', serif;
            color: var(--navy-text);
            font-size: 1.2rem;
            font-weight: 900;
            text-shadow: none;
            margin-bottom: 5px;
        }

        .art-medium {
            font-family: 'Lora', serif;
            font-style: italic;
            color: var(--slate-accent);
            font-size: 0.95rem;
            text-shadow: none;
        }

        /* --------------------------------------
           FOOTER
           -------------------------------------- */
        footer {
            margin-top: 100px;
            padding: 40px 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr; /* 1 column on phones */
            }
        }
    </style>
</head>
<body>

    <nav class="main-menu">
        <a href="index.html" class="nav-btn btn-home">Home</a>
        <a href="cv.html" class="nav-btn btn-about">About</a>
        <a href="#" class="nav-btn btn-projects">Projects</a>
        <a href="#" class="nav-btn btn-blog">Blog</a>
    </nav>

    <div class="gallery-container">
        
        <header class="gallery-header">
            <h1>The Sketchbook</h1>
            <p>Visual Lore & Illustrations</p>
        </header>

        <div class="gallery-grid">
            
            <div class="art-frame">
                <img src="image_1.jpg" alt="Artwork Description" class="art-image">
                <div class="art-caption">Fusion</div>
                <div class="art-medium">2019 - Oil on Canva</div>
            </div>

            <div class="art-frame">
                <img src="image_2.jpg" alt="Artwork Description" class="art-image">
                <div class="art-caption">Bitter Sweet</div>
                <div class="art-medium"> 2019 - Colour Pencils </div>
            </div>

            <div class="art-frame">
                <img src="image_3.jpg" alt="Artwork Description" class="art-image">
                <div class="art-caption">Death and Reborn</div>
                <div class="art-medium">2020 - Archylic on Paper</div>
            </div>


            </div>

    </div>

    <footer>
        <p style="font-size: 0.9rem; opacity: 0.8; font-family: 'Cinzel', serif; letter-spacing: 2px;">
            © <span id="currentYear"></span>. Powered by Dreamy Codes.
        </p>
    </footer>

    <script>
        document.getElementById("currentYear").textContent = new Date().getFullYear();
    </script>
</body>
</html>
